<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Stackly</title>
<meta name="description" content="The page you're looking for doesn't exist. Head back to Stackly and let's get your growth strategy back on track.">
<link rel="icon" href="logo-stackly-icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="style.css">
</head>
<style>

/* ============================================
   404 PAGE — themed with violet/signal palette
   ============================================ */
*{box-sizing:border-box;}

.error-screen{
  position:relative;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:40px 24px;
  text-align:center;
}

/* Background image, full-bleed */
.error-bg{
  position:absolute;
  inset:0;
  z-index:0;
}
.error-bg img{
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
  filter:saturate(0.85) brightness(0.55);
}

/* Dark gradient wash so text stays readable over the photo */
.error-bg-overlay{
  position:absolute;
  inset:0;
  z-index:1;
  background:
    radial-gradient(circle at 50% 30%, rgba(13,11,28,0.55), rgba(7,7,16,0.93) 70%),
    linear-gradient(180deg, rgba(7,7,16,0.75) 0%, rgba(7,7,16,0.94) 100%);
}

/* Drifting colour blobs for ambient motion */
.error-blob{
  position:absolute;
  border-radius:50%;
  filter:blur(100px);
  z-index:1;
  pointer-events:none;
  opacity:0.38;
}
.error-blob-violet{
  width:480px; height:480px;
  background:var(--violet);
  top:-140px; left:-120px;
  animation:driftA 16s ease-in-out infinite;
}
.error-blob-signal{
  width:420px; height:420px;
  background:var(--signal);
  bottom:-160px; right:-100px;
  animation:driftB 18s ease-in-out infinite;
}
@keyframes driftA{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(60px,40px) scale(1.12); }
}
@keyframes driftB{
  0%,100%{ transform:translate(0,0) scale(1); }
  50%{ transform:translate(-50px,-30px) scale(1.08); }
}

/* Floating particles layer */
.error-particles{
  position:absolute; inset:0; z-index:1; pointer-events:none;
}
.error-particle{
  position:absolute;
  border-radius:50%;
  background:var(--violet-soft);
  opacity:0.5;
  animation:floatUp linear infinite;
}
@keyframes floatUp{
  0%{ transform:translateY(0) translateX(0); opacity:0; }
  10%{ opacity:0.55; }
  90%{ opacity:0.35; }
  100%{ transform:translateY(-90vh) translateX(20px); opacity:0; }
}

/* Content */
.error-content{
  position:relative;
  z-index:3;
  max-width:680px;
}

/* Big animated 404 */
.error-code{
  font-family:var(--f-display);
  font-weight:800;
  font-size:clamp(110px, 22vw, 220px);
  line-height:0.9;
  letter-spacing:-0.03em;
  margin:0;
  background:linear-gradient(100deg, var(--violet) 0%, var(--violet-soft) 35%, var(--signal-soft) 65%, var(--signal) 100%);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:shimmer 6s ease-in-out infinite;
  position:relative;
  display:inline-block;
}
@keyframes shimmer{
  0%,100%{ background-position:0% 50%; }
  50%{ background-position:100% 50%; }
}

/* Glitch-flicker accent on the middle "0" using a pseudo layer */
.error-code-wrap{
  position:relative;
  display:inline-block;
  margin-bottom:8px;
}
.error-code-wrap::after{
  content:'404';
  position:absolute;
  inset:0;
  font-family:var(--f-display);
  font-weight:800;
  font-size:clamp(110px, 22vw, 220px);
  line-height:0.9;
  letter-spacing:-0.03em;
  color:transparent;
  -webkit-text-stroke:1px rgba(157,143,255,0.35);
  animation:glitchPulse 3.4s ease-in-out infinite;
  pointer-events:none;
}
@keyframes glitchPulse{
  0%,76%,100%{ opacity:0; transform:translate(0,0); }
  78%{ opacity:0.7; transform:translate(3px,-2px); }
  80%{ opacity:0; transform:translate(-2px,2px); }
  82%{ opacity:0.5; transform:translate(2px,1px); }
  84%{ opacity:0; }
}

.error-eyebrow{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-family:var(--f-mono);
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--signal-soft);
  background:rgba(255,91,60,0.1);
  border:1px solid rgba(255,91,60,0.3);
  border-radius:100px;
  padding:7px 16px;
  margin-bottom:28px;
  animation:fadeInUp .7s ease both;
}
.error-eyebrow .dot{
  width:6px; height:6px; border-radius:50%;
  background:var(--signal);
  box-shadow:0 0 0 0 rgba(255,91,60,0.6);
  animation:dotPulse 2s infinite;
}
@keyframes dotPulse{
  0%{ box-shadow:0 0 0 0 rgba(255,91,60,0.6); }
  70%{ box-shadow:0 0 0 7px rgba(255,91,60,0); }
  100%{ box-shadow:0 0 0 0 rgba(255,91,60,0); }
}

.error-content h1{
  font-family:var(--f-display);
  font-size:clamp(26px, 3.4vw, 38px);
  color:#fff;
  margin:0 0 16px;
  letter-spacing:-0.01em;
  animation:fadeInUp .7s ease .1s both;
}
.error-content p{
  color:rgba(245,243,238,0.65);
  font-size:16px;
  line-height:1.65;
  max-width:480px;
  margin:0 auto 36px;
  animation:fadeInUp .7s ease .2s both;
}

@keyframes fadeInUp{
  0%{ opacity:0; transform:translateY(16px); }
  100%{ opacity:1; transform:translateY(0); }
}

/* Action buttons */
.error-actions{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:14px;
  flex-wrap:wrap;
  margin-bottom:48px;
  animation:fadeInUp .7s ease .3s both;
}
.error-btn-primary{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:linear-gradient(95deg,var(--violet),var(--signal));
  color:#fff;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  padding:15px 28px;
  border-radius:100px;
  border:none;
  text-decoration:none;
  transition:transform .3s, box-shadow .3s;
}
.error-btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 28px rgba(109,91,255,0.35);
}
.error-btn-secondary{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:rgba(255,255,255,0.04);
  color:#fff;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  padding:15px 28px;
  border-radius:100px;
  border:1px solid rgba(255,255,255,0.16);
  text-decoration:none;
  cursor:pointer;
  transition:border-color .3s, transform .3s, background .3s;
}
.error-btn-secondary:hover{
  border-color:var(--violet-soft);
  background:rgba(255,255,255,0.08);
  transform:translateY(-2px);
}

/* Quick links row */
.error-quicklinks{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px 22px;
  font-size:13.5px;
  animation:fadeInUp .7s ease .4s both;
}
.error-quicklinks span{
  color:rgba(245,243,238,0.4);
  font-family:var(--f-mono);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
}
.error-quicklinks a{
  color:rgba(245,243,238,0.7);
  text-decoration:none;
  position:relative;
  transition:color .25s;
}
.error-quicklinks a::after{
  content:'';
  position:absolute;
  left:0; right:0; bottom:-3px;
  height:1px;
  background:var(--violet-soft);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .25s;
}
.error-quicklinks a:hover{ color:#fff; }
.error-quicklinks a:hover::after{ transform:scaleX(1); }

/* ===================== RESPONSIVE ===================== */
@media (max-width:640px){
  .error-screen{padding:32px 18px;}
  .error-code, .error-code-wrap::after{font-size:clamp(80px,28vw,140px);}
  .error-actions{flex-direction:column; width:100%;}
  .error-btn-primary, .error-btn-secondary{width:100%; justify-content:center;}
  .error-quicklinks{flex-direction:column; gap:10px;}
}

@media (prefers-reduced-motion: reduce){
  .error-code, .error-blob-violet, .error-blob-signal, .error-particle, .error-code-wrap::after{
    animation:none !important;
  }
}
</style>
</head>
<body>

<div class="error-screen">

  <!-- Background image -->
  <div class="error-bg">
    <img
      src="https://images.unsplash.com/photo-1551434678-e076c223a692?q=80&w=2400&auto=format&fit=crop"
      alt=""
      loading="eager">
  </div>
  <div class="error-bg-overlay"></div>

  <!-- Animated colour blobs -->
  <div class="error-blob error-blob-violet"></div>
  <div class="error-blob error-blob-signal"></div>

  <!-- Floating particles (positioned via inline JS below) -->
  <div class="error-particles" id="errorParticles"></div>

  <!-- Content -->
  <div class="error-content">

    
    <div class="error-code-wrap">
      <h2 class="error-code">404</h2>
    </div>
    <br>
    <div class="error-eyebrow"><span class="dot"></span> Error 404 &middot; Page not found</div>

    <h1>This page got lost in the sales funnel.</h1>
    <p>The page you're looking for doesn't exist, moved, or never converted. Let's get you back to a page that's actually driving results.</p>

    <div class="error-actions">
      <a href="index.html" class="error-btn-primary">
        Return to Home <span class="arrow">&rarr;</span>
      </a>
      <button type="button" class="error-btn-secondary" onclick="window.history.back()">
        &larr; Back
      </button>
    </div>

    <!-- <div class="error-quicklinks">
      <span>Or jump to</span>
      <a href="services.html">Services</a>
      <a href="projects.html">Projects</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
    </div> -->

  </div>

</div>

<script>
  // Generate floating ambient particles
  (function(){
    const wrap = document.getElementById('errorParticles');
    const count = window.innerWidth < 640 ? 14 : 26;
    for (let i = 0; i < count; i++){
      const p = document.createElement('div');
      p.className = 'error-particle';
      const size = 2 + Math.random() * 4;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.bottom = '-20px';
      p.style.animationDuration = (10 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      if (Math.random() > 0.5){
        p.style.background = 'var(--signal-soft)';
      }
      wrap.appendChild(p);
    }
  })();
</script>
</body>
</html>
